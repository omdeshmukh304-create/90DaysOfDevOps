<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College ID Card</title>

<style>

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f1f5f9;
    font-family:Arial, Helvetica, sans-serif;
}

.id-card{
    width:300px;
    border-radius:12px;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    overflow:hidden;
    text-align:center;
}

.header{
    background:#2563eb;
    color:white;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

.photo{
    margin-top:15px;
}

.photo img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid #2563eb;
}

.info{
    padding:15px;
    font-size:14px;
}

.info p{
    margin:6px 0;
}

.footer{
    background:#2563eb;
    color:white;
    padding:8px;
    font-size:12px;
}

</style>
</head>

<body>

<div class="id-card">

<div class="header">
ABC COLLEGE
</div>

<div class="photo">
<img src="https://via.placeholder.com/90" alt="Student Photo">
</div>

<div class="info">
<p><strong>Name:</strong> OM DESHMUKH</p>
<p><strong>ID:</strong> 2026CS101</p>
<p><strong>Course:</strong> B.Tech CSE</p>
<p><strong>Blood Group:</strong> O+</p>
</div>

<div class="footer">
Valid Till 2028
</div>

</div>

</body>
</html>
